<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="GymTracker">
<meta name="theme-color" content="#0a0a0f">
<title>GymTracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c26;--surface3:#252530;--accent:#c8f05a;--accent2:#7c6af7;--text:#f0f0f5;--text2:#8888a0;--text3:#555568;--border:#2a2a38;--danger:#f05a5a;--warn:#f0a85a;--success:#5af0a8;--r:16px;--rs:10px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:#0a0a0f}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0f;color:#f0f0f5;min-height:100vh;overflow-x:hidden;padding-bottom:80px}
h1{font-size:24px;font-weight:700;letter-spacing:-0.5px}
h2{font-size:18px;font-weight:600}
.page{display:none;padding:0 14px;background:#0a0a0f;min-height:100vh}
.page.active{display:block}
nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100}
nav button{flex:1;background:none;border:none;color:var(--text2);padding:10px 0 12px;font-size:10px;font-weight:500;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .15s}
nav button.active{color:var(--accent)}
nav button svg{width:20px;height:20px}
.header{padding:20px 14px 12px;position:sticky;top:0;background:#0a0a0f;z-index:50;border-bottom:1px solid #2a2a38;margin:0 -14px 14px}
.hrow{display:flex;align-items:center;justify-content:space-between}
.card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:14px;margin-bottom:10px}
.btn{border:none;border-radius:var(--rs);font-size:15px;font-weight:600;cursor:pointer;padding:13px 20px;transition:all .15s;width:100%;margin-top:8px}
.btn-p{background:var(--accent);color:#0a0a0f}
.btn-p:active{opacity:.85}
.btn-g{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.btn-d{background:rgba(240,90,90,.1);color:var(--danger);border:1px solid rgba(240,90,90,.2)}
.bicon{background:var(--surface2);border:1px solid var(--border);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0}
.bicon:active{transform:scale(.9)}
input[type=number]{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:16px;padding:9px 10px;width:100%;outline:none;-moz-appearance:textfield;font-family:monospace}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input:focus{border-color:var(--accent2)}
label{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.5px}
select{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:15px;padding:10px 12px;width:100%;outline:none;-webkit-appearance:none}
.sw{position:relative}.sw::after{content:'▾';position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text2);pointer-events:none}
.ex-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.ex-hd{padding:13px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.ex-bd{padding:0 14px 14px;border-top:1px solid var(--border)}
.ex-bd.hidden{display:none}
.set-row{display:grid;grid-template-columns:28px 1fr 1fr 36px;gap:6px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
.set-row:last-child{border-bottom:none}
.set-done input{color:var(--success)!important}
.pbar-w{background:var(--surface3);border-radius:4px;height:4px;margin-top:10px}
.pbar{background:var(--accent);border-radius:4px;height:100%;transition:width .3s}
.day-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.day-card.today{border-color:rgba(200,240,90,.4);background:rgba(200,240,90,.04)}
.day-card:active{opacity:.8}
.hist-date{font-size:11px;color:var(--text3);font-family:monospace;margin:14px 0 6px}
.hist-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:12px;margin-bottom:6px}
.cw{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.cc{position:relative;height:180px}
.pr{display:inline-block;background:rgba(200,240,90,.15);color:var(--accent);font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
.empty{text-align:center;padding:48px 24px;color:var(--text2)}
#toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:var(--surface3);color:var(--text);padding:10px 20px;border-radius:20px;font-size:14px;font-weight:500;opacity:0;transition:opacity .2s;z-index:999;white-space:nowrap;border:1px solid var(--border)}
#toast.show{opacity:1}
.mo{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.7);display:flex;align-items:flex-end}
.mo.hidden{display:none}
.mb{background:var(--surface);border-radius:24px 24px 0 0;padding:24px 18px;width:100%;border:1px solid var(--border)}
.banner{background:rgba(124,106,247,.1);border:1px solid rgba(124,106,247,.3);border-radius:var(--rs);padding:12px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;cursor:pointer}
.dot{width:8px;height:8px;border-radius:50%;background:var(--accent2);margin-right:8px;animation:pulse 1.5s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.chips{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.chip{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:12px 8px;text-align:center}
.chip-v{font-size:22px;font-weight:700;margin-bottom:2px}
.chip-l{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dow{font-size:10px;font-weight:600;color:var(--text3);text-align:center;padding:4px 0;text-transform:uppercase}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;position:relative;cursor:default}
.cal-circle{width:88%;aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;border:2px solid transparent;transition:all .2s}
.cal-circle.empty{color:var(--text3)}
.cal-circle.rest{border-color:var(--border);color:var(--text2)}
.cal-circle.done{border-color:var(--accent);background:rgba(200,240,90,.15);color:var(--accent)}
.cal-circle.today-ring{border-color:var(--accent2)!important;box-shadow:0 0 0 2px rgba(124,106,247,.3)}
.cal-circle.future{color:var(--text3);opacity:.4}
.cal-legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.cal-legend-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
</style>
</head>
<body>
<div id="toast"></div>

<!-- HOME -->

<div class="page active" id="page-home">
  <div class="header">
    <div class="hrow">
      <div><p style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px">GymTracker</p><h1 id="h-greet">¡Hola! 💪</h1></div>
      <div style="text-align:right"><p style="font-size:12px;color:var(--text2)" id="h-date"></p><p style="font-size:13px;font-weight:600;color:var(--accent)" id="h-streak"></p></div>
    </div>
  </div>
  <div id="h-banner"></div>
  <p style="font-size:11px;color:var(--text2);margin-bottom:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px">Rutina semanal</p>
  <div id="days-list"></div>
</div>

<!-- WORKOUT -->

<div class="page" id="page-workout">
  <div class="header">
    <div class="hrow">
      <div>
        <p style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px" id="w-label"></p>
        <h1>Entrenando</h1>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div style="text-align:center">
          <p style="font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px">Tiempo</p>
          <p id="w-timer" style="font-size:18px;font-weight:700;font-family:monospace;color:var(--accent2);letter-spacing:1px">00:00</p>
        </div>
        <button class="bicon" onclick="finishWorkout()" title="Finalizar" style="background:rgba(200,240,90,.1);border-color:rgba(200,240,90,.3);color:var(--accent);font-size:18px">✓</button>
      </div>
    </div>
    <div class="pbar-w"><div class="pbar" id="w-prog" style="width:0%"></div></div>
    <p style="font-size:11px;color:var(--text2);margin-top:5px" id="w-prog-lbl"></p>
  </div>
  <div style="background:rgba(240,168,90,.06);border:1px solid rgba(240,168,90,.15);border-radius:10px;padding:11px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between">
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:18px">🔥</span>
      <div>
        <p style="font-size:11px;color:var(--text2);margin-bottom:2px">Calorías quemadas</p>
        <p style="font-size:10px;color:var(--text3)">Introduce el dato de tu reloj al acabar</p>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <input type="number" id="w-calories" inputmode="numeric" placeholder="0" style="width:72px;text-align:center;padding:7px 8px;font-size:15px;font-weight:600;color:var(--warn)">
      <span style="font-size:12px;color:var(--text2)">kcal</span>
    </div>
  </div>
  <div id="ex-list"></div>
  <button class="btn btn-p" onclick="finishWorkout()">Finalizar entrenamiento ✓</button>
</div>

<!-- HISTORY -->

<div class="page" id="page-history">
  <div class="header">
    <div class="hrow">
      <h1>Historial</h1>
      <button onclick="showClearModal()" style="background:none;border:none;color:var(--text2);font-size:13px;cursor:pointer">Borrar todo</button>
    </div>
  </div>
  <div id="hist-list"></div>
</div>

<!-- PROGRESS -->

<div class="page" id="page-progress">
  <div class="header"><h1>Progreso</h1></div>
  <div style="display:flex;gap:8px;margin-bottom:16px">
    <button id="ptab-ex" onclick="switchPTab('ex')" class="btn btn-p" style="flex:1;margin:0;padding:10px;font-size:13px">Ejercicios</button>
    <button id="ptab-stats" onclick="switchPTab('stats')" class="btn btn-g" style="flex:1;margin:0;padding:10px;font-size:13px">Calorías y tiempo</button>
  </div>
  <div id="ptab-ex-content">
    <div style="margin-bottom:14px"><label>Ejercicio</label><div class="sw"><select id="prog-sel" onchange="renderProgress()"></select></div></div>
    <div id="prog-content"></div>
  </div>
  <div id="ptab-stats-content" style="display:none">
    <div id="stats-content"></div>
  </div>
</div>

<!-- CALENDAR -->

<div class="page" id="page-calendar">
  <div class="header">
    <div class="hrow">
      <button onclick="prevMonth()" style="background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;padding:0 8px">‹</button>
      <h1 id="cal-title" style="font-size:20px"></h1>
      <button onclick="nextMonth()" style="background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;padding:0 8px">›</button>
    </div>
  </div>
  <div id="cal-stats" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px"></div>
  <div id="cal-grid"></div>
  <div id="cal-legend" style="margin-top:12px;display:flex;gap:16px;justify-content:center;flex-wrap:wrap"></div>
</div>

<!-- MODAL -->

<div class="mo hidden" id="clear-modal">
  <div class="mb">
    <h2 style="margin-bottom:10px">Borrar datos</h2>
    <p style="color:var(--text2);font-size:14px;margin-bottom:18px">¿Qué quieres borrar?</p>
    <button class="btn btn-d" onclick="clearToday()" style="margin-bottom:8px">Borrar solo los datos de hoy</button>
    <button class="btn btn-d" onclick="clearAll()" style="margin-bottom:8px;opacity:0.7">Borrar todo el historial</button>
    <button class="btn btn-g" onclick="hideClear()">Cancelar</button>
  </div>
</div>

<!-- NUTRICIÓN -->

<div class="page" id="page-nutrition">
  <div class="header">
    <div class="hrow">
      <div>
        <p style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px">Nutrición</p>
        <h1 id="nut-title">Hoy</h1>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button onclick="nutPrevDay()" style="background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer">‹</button>
        <button onclick="nutNextDay()" style="background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer">›</button>
      </div>
    </div>
  </div>
  <div id="nut-balance" style="margin-bottom:14px"></div>
  <div id="nut-meals"></div>
</div>

<!-- MODAL SELECCIÓN RUTINA -->

<div class="mo hidden" id="routine-modal">
  <div class="mb">
    <h2 style="margin-bottom:6px">¿Qué entrenas hoy?</h2>
    <p style="color:var(--text2);font-size:13px;margin-bottom:16px">Elige la rutina independientemente del día</p>
    <div id="routine-options"></div>
    <button class="btn btn-g" style="margin-top:4px" onclick="hideRoutineModal()">Cancelar</button>
  </div>
</div>

<nav>
  <button class="active" id="nav-home" onclick="go('home')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>Inicio
  </button>
  <button id="nav-workout" onclick="go('workout')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>Entreno
  </button>
  <button id="nav-history" onclick="go('history')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Historial
  </button>
  <button id="nav-progress" onclick="go('progress')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg>Progreso
  </button>
  <button id="nav-calendar" onclick="go('calendar')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Cal
  </button>
  <button id="nav-nutrition" onclick="go('nutrition')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>Nutrición
  </button>
</nav>

<script>
const R={lunes:{name:"Lunes",emoji:"🍑",cardio:null,exercises:[{id:"puente_gluteo",name:"Puente de glúteo",sets:2,reps:"15",unit:"kg",note:"Calentamiento"},{id:"desplaz_lateral",name:"Desplazamiento lateral con banda",sets:2,reps:"20",unit:"banda",note:"Calentamiento"},{id:"zancadas_manc",name:"Zancadas con mancuernas",sets:3,reps:"20",unit:"kg c/mano"},{id:"peso_muerto",name:"Peso muerto",sets:3,reps:"15",unit:"kg"},{id:"kettlebell_swing",name:"Kettlebell swing",sets:3,reps:"20",unit:"kg"}]},martes:{name:"Martes",emoji:"🦵",cardio:"15 min calentamiento",exercises:[{id:"puente_gluteo",name:"Puente de glúteo",sets:2,reps:"15",unit:"kg",note:"Calentamiento"},{id:"desplaz_lateral",name:"Desplazamiento lateral con banda",sets:2,reps:"20",unit:"banda",note:"Calentamiento"},{id:"squat_sumo",name:"Sentadilla sumo en multipower",sets:3,reps:"8-12",unit:"kg"},{id:"hip_thrust_maq",name:"Hip Thrust con máquina",sets:3,reps:"8-12",unit:"kg"},{id:"peso_muerto_rum",name:"Peso muerto rumano",sets:3,reps:"8-12",unit:"kg"},{id:"abduccion",name:"Abducción de cadera en máquina",sets:3,reps:"10+10",unit:"kg",note:"10 pesadas + 10 ligeras"},{id:"gemelos",name:"Extensión de gemelos",sets:3,reps:"8-12",unit:"kg"},{id:"plancha",name:"Plancha isométrica",sets:3,reps:"45-60s",unit:"seg"}]},jueves:{name:"Jueves",emoji:"💪",cardio:"15 min cardio",exercises:[{id:"mov_hombro_1",name:"Movilidad hombro (flexión antepulsión)",sets:2,reps:"12-15",unit:"kg",note:"Superserie"},{id:"mov_hombro_2",name:"Movilidad hombro (extensión)",sets:2,reps:"12-15",unit:"kg",note:"Superserie"},{id:"flexiones",name:"Flexiones",sets:3,reps:"12",unit:"corporal"},{id:"remo_barra",name:"Remos con barra",sets:3,reps:"8-12",unit:"kg"},{id:"remo_uni",name:"Remo unilateral con mancuerna",sets:3,reps:"8-12",unit:"kg"},{id:"elev_lat",name:"Elevaciones laterales",sets:3,reps:"10+10",unit:"kg",note:"10 pesadas + 10 ligeras"},{id:"aperturas_post",name:"Aperturas posteriores hombro",sets:3,reps:"12-15",unit:"kg"},{id:"curl_biceps",name:"Curl de bíceps con mancuernas",sets:3,reps:"8-12",unit:"kg"}]},viernes:{name:"Viernes",emoji:"🏋️",cardio:"15 min calentamiento",exercises:[{id:"puente_gluteo",name:"Puente de glúteo",sets:2,reps:"15",unit:"kg",note:"Calentamiento"},{id:"desplaz_lateral",name:"Desplazamiento lateral con banda",sets:2,reps:"20",unit:"banda",note:"Calentamiento"},{id:"squat_bulgara",name:"Sentadilla búlgara con mancuernas",sets:3,reps:"8-12",unit:"kg"},{id:"squat_step",name:"Sentadilla en STEP (ROM aumentado)",sets:3,reps:"12-15",unit:"kg"},{id:"curl_femoral",name:"Curl de femoral tumbada",sets:3,reps:"8-12",unit:"kg"},{id:"hyperext",name:"Hiperextensión 45°",sets:3,reps:"10+10",unit:"kg",note:"10 pesadas + 10 ligeras"},{id:"ext_cuad",name:"Extensión de cuádriceps",sets:3,reps:"10+10",unit:"kg",note:"10 pesadas + 10 ligeras"}]},sabado:{name:"Sábado",emoji:"🔥",cardio:"15 min cardio + 30 min cardio final",exercises:[{id:"mov_hombro_1",name:"Movilidad hombro (flexión antepulsión)",sets:2,reps:"12-15",unit:"kg",note:"Superserie"},{id:"mov_hombro_2",name:"Movilidad hombro (extensión)",sets:2,reps:"12-15",unit:"kg",note:"Superserie"},{id:"press_mil",name:"Press militar mancuernas (sentada)",sets:3,reps:"8-12",unit:"kg",note:"Superserie"},{id:"elev_front",name:"Elevaciones frontales con disco",sets:3,reps:"8-12",unit:"kg",note:"Superserie"},{id:"renegade",name:"Renegade row",sets:3,reps:"8-12",unit:"kg"},{id:"aperturas_post",name:"Aperturas posteriores hombro",sets:3,reps:"12-15",unit:"kg"},{id:"press_franc",name:"Press francés en banco",sets:3,reps:"8-12",unit:"kg"}]},domingo:{name:"Domingo",emoji:"🌿",cardio:"15 min calentamiento + 30 min cardio final",exercises:[{id:"puente_gluteo",name:"Puente de glúteo",sets:2,reps:"15",unit:"kg",note:"Calentamiento"},{id:"desplaz_lateral",name:"Desplazamiento lateral con banda",sets:2,reps:"20",unit:"banda",note:"Calentamiento"},{id:"hip_thrust",name:"Hip Thrust",sets:3,reps:"8-12",unit:"kg"},{id:"prensa",name:"Prensa inclinada",sets:3,reps:"10-14",unit:"kg"},{id:"zancadas",name:"Zancadas",sets:3,reps:"8-12",unit:"kg"},{id:"ext_cadera_polea",name:"Extensión de cadera en polea baja",sets:3,reps:"8-12",unit:"kg"},{id:"crunch_maq",name:"Crunch en máquina (tumbada)",sets:3,reps:"12-15",unit:"kg"},{id:"knee_raise",name:"Knee raise",sets:3,reps:"12-15",unit:"corporal"}]}};
const ORDER=['lunes','martes','jueves','viernes','sabado','domingo'];
const WMAP={0:'domingo',1:'lunes',2:'martes',3:null,4:'jueves',5:'viernes',6:'sabado'};

function go(p){
  document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(e=>e.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.getElementById('nav-'+p).classList.add('active');
  if(p==='home')renderHome();
  if(p==='history')renderHistory();
  if(p==='progress')renderProgressPage();
  if(p==='calendar')renderCalendar();
  if(p==='nutrition')renderNutrition();
}

let nutDate=new Date();
nutDate.setHours(0,0,0,0);

function nutDayKey(d){
  const keys=['domingo','lunes','martes','miercoles','jueves','viernes','sabado'];
  return keys[d.getDay()];
}
function nutStorageKey(d){return`nut-${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;}
function nutPrevDay(){nutDate=new Date(nutDate);nutDate.setDate(nutDate.getDate()-1);renderNutrition();}
function nutNextDay(){nutDate=new Date(nutDate);nutDate.setDate(nutDate.getDate()+1);renderNutrition();}

function saveTotalBurned(val){
  const storeKey=nutStorageKey(nutDate);
  const s=gs(storeKey,{checked:{},extraKcal:0,totalBurnedOverride:0});
  s.totalBurnedOverride=parseInt(val)||0;
  ss(storeKey,s);
  renderNutrition();
}

function saveExtraKcal(val){
  const storeKey=nutStorageKey(nutDate);
  const s=gs(storeKey,{checked:{},extraKcal:0,totalBurnedOverride:0});
  s.extraKcal=parseInt(val)||0;
  ss(storeKey,s);
}

function getLastW(key,hist){
  const e=hist.filter(w=>w.day===key).sort((a,b)=>b.date-a.date);
  if(!e.length)return null;
  const d=new Date(e[0].date);
  return`${d.getDate()}/${d.getMonth()+1}`;
}

function calcStreak(hist){
  if(!hist.length)return 0;
  const dates=[...new Set(hist.map(w=>new Date(w.date).toDateString()))].map(d=>new Date(d)).sort((a,b)=>b-a);
  const today=new Date();today.setHours(0,0,0,0);
  let s=0,c=new Date(today);
  for(const d of dates){const dc=new Date(d);dc.setHours(0,0,0,0);if(dc.getTime()===c.getTime()){s++;c.setDate(c.getDate()-1);}else if(dc<c)break;}
  return s;
}

function showRoutineModal(suggestedKey){
  const modal=document.getElementById('routine-modal');
  const opts=document.getElementById('routine-options');
  opts.innerHTML='';
  ORDER.forEach(key=>{
    const day=R[key];
    const isSuggested=key===suggestedKey;
    const btn=document.createElement('button');
    btn.className='btn '+(isSuggested?'btn-p':'btn-g');
    btn.style.cssText='width:100%;margin-bottom:8px;text-align:left;padding:12px 14px;display:flex;align-items:center;justify-content:space-between';
    btn.innerHTML=`<span>${day.emoji} ${day.name}<\/span>${isSuggested?'<span style="font-size:11px;opacity:.7">← sugerido<\/span>':''}`;
    btn.onclick=()=>{hideRoutineModal();startW(key);};
    opts.appendChild(btn);
  });
  modal.classList.remove('hidden');
}
function hideRoutineModal(){document.getElementById('routine-modal').classList.add('hidden');}

function startW(key){
  curDay=key;wSets={};
  const hist=gs('workouts',[]);
  const today=new Date().toDateString();
  const existing=hist.filter(w=>w.day===key&&new Date(w.date).toDateString()===today).pop();
  R[key].exercises.forEach(ex=>{
    if(existing){
      const savedEx=existing.exercises.find(e=>e.id===ex.id);
      if(savedEx&&savedEx.sets.length>0){
        const filledSets=savedEx.sets.map(s=>({weight:s.weight||'',reps:s.reps||'',done:true}));
        while(filledSets.length<ex.sets)filledSets.push({reps:'',weight:'',done:false});
        wSets[ex.id]=filledSets;
        return;
      }
    }
    wSets[ex.id]=Array.from({length:ex.sets},()=>({reps:'',weight:'',done:false}));
  });
  if(timerInterval)clearInterval(timerInterval);
  timerStart=existing?Date.now()-(existing.duration||0)*1000:Date.now();
  timerInterval=setInterval(()=>{
    const elapsed=Math.floor((Date.now()-timerStart)/1000);
    const m=Math.floor(elapsed/60).toString().padStart(2,'0');
    const s=(elapsed%60).toString().padStart(2,'0');
    const el=document.getElementById('w-timer');
    if(el)el.textContent=`${m}:${s}`;
  },1000);
  renderWorkout();go('workout');
}

function renderWorkout(){
  if(!curDay)return;
  const day=R[curDay];
  document.getElementById('w-label').textContent=`${day.emoji} ${day.name}`;
  const total=Object.values(wSets).flat().length;
  const done=Object.values(wSets).flat().filter(s=>s.done).length;
  const pct=total>0?Math.round(done/total*100):0;
  document.getElementById('w-prog').style.width=pct+'%';
  document.getElementById('w-prog-lbl').textContent=`${done}/${total} series completadas`;
  const cont=document.getElementById('ex-list');
  cont.innerHTML='';
  if(day.cardio){
    const cb=document.createElement('div');
    cb.style.cssText='background:rgba(240,168,90,.08);border:1px solid rgba(240,168,90,.2);border-radius:10px;padding:11px 13px;margin-bottom:12px;font-size:13px;color:var(--warn)';
    cb.textContent='🏃 '+day.cardio;
    cont.appendChild(cb);
  }
  day.exercises.forEach((ex,ei)=>{
    const sets=wSets[ex.id]||[];
    const allDone=sets.every(s=>s.done);
    const doneCnt=sets.filter(s=>s.done).length;
    const div=document.createElement('div');
    div.className='ex-item';
    div.id='ex-item-'+ei;
    div.innerHTML=`
      <div class="ex-hd" onclick="toggleEx(${ei})">
        <div style="flex:1;min-width:0">
          <p style="font-size:14px;font-weight:600;${allDone?'color:var(--success)':''}">${allDone?'✅ ':''}${ex.name}<\/p>
          <p style="font-size:11px;color:var(--text2);margin-top:2px">${ex.sets}×${ex.reps} ${ex.unit}${ex.note?' · '+ex.note:''} · ${doneCnt}/${ex.sets}<\/p>
        <\/div>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2"><polyline points="6,9 12,15 18,9"/><\/svg>
      <\/div>
      <div class="ex-bd${ei>0?' hidden':''}" id="eb-${ei}">
        <div style="display:grid;grid-template-columns:28px 1fr 1fr 36px;gap:6px;padding:8px 0 2px">
          <span style="font-size:10px;color:var(--text3);text-align:center">#<\/span>
          <span style="font-size:10px;color:var(--text2)">${ex.unit==='seg'?'Seg':'Peso'} (${ex.unit})<\/span>
          <span style="font-size:10px;color:var(--text2)">Reps<\/span>
          <span><\/span>
        <\/div>
        ${sets.map((s,si)=>`
          <div class="set-row${s.done?' set-done':''}" id="sr-${ei}-${si}">
            <span style="font-size:11px;color:var(--text3);text-align:center">${si+1}<\/span>
            <input type="number" inputmode="decimal" placeholder="0" value="${s.weight}" onchange="upSet(${ei},${si},'weight',this.value)" style="${s.done?'color:var(--success)':''}">
            <input type="number" inputmode="numeric" placeholder="${ex.reps}" value="${s.reps}" onchange="upSet(${ei},${si},'reps',this.value)" style="${s.done?'color:var(--success)':''}">
            <button class="bicon" onclick="togSet(${ei},${si})" style="${s.done?'background:rgba(90,240,168,.15);border-color:rgba(90,240,168,.3);color:var(--success)':''}">${s.done?'✓':'○'}<\/button>
          <\/div>`).join('')}
      <\/div>`;
    cont.appendChild(div);
  });
}

function toggleEx(ei){const b=document.getElementById('eb-'+ei);b.classList.toggle('hidden');}
function upSet(ei,si,f,v){const ex=R[curDay].exercises[ei];wSets[ex.id][si][f]=v;}
function togSet(ei,si){
  const ex=R[curDay].exercises[ei];
  const s=wSets[ex.id][si];
  s.done=!s.done;

  // actualizar solo la fila tocada, sin redibujar nada más
  const row=document.getElementById('sr-'+ei+'-'+si);
  if(row){
    if(s.done){row.classList.add('set-done');}else{row.classList.remove('set-done');}
    const btn=row.querySelector('button');
    if(btn){
      btn.textContent=s.done?'✓':'○';
      btn.style.background=s.done?'rgba(90,240,168,.15)':'';
      btn.style.borderColor=s.done?'rgba(90,240,168,.3)':'';
      btn.style.color=s.done?'var(--success)':'';
    }
    row.querySelectorAll('input').forEach(inp=>{inp.style.color=s.done?'var(--success)':'';});
  }

  // actualizar contador y nombre del ejercicio
  const sets=wSets[ex.id]||[];
  const doneCnt=sets.filter(x=>x.done).length;
  const allDone=sets.every(x=>x.done);
  const hd=document.getElementById('ex-item-'+ei);
  if(hd){
    const nameEl=hd.querySelector('.ex-hd p:first-child');
    if(nameEl){nameEl.textContent=(allDone?'✅ ':'')+ex.name;nameEl.style.color=allDone?'var(--success)':'';}
    const metaEl=hd.querySelector('.ex-hd p:last-child');
    if(metaEl){metaEl.textContent=`${ex.sets}×${ex.reps} ${ex.unit}${ex.note?' · '+ex.note:''} · ${doneCnt}/${ex.sets}`;}
  }

  // actualizar barra de progreso
  const total=Object.values(wSets).flat().length;
  const done=Object.values(wSets).flat().filter(x=>x.done).length;
  const pct=total>0?Math.round(done/total*100):0;
  document.getElementById('w-prog').style.width=pct+'%';
  document.getElementById('w-prog-lbl').textContent=`${done}/${total} series completadas`;

  if(done===total)toast('¡Entreno completado! 🎉');
}

function finishWorkout(){
  if(!curDay)return;
  const day=R[curDay];
  const doneSets=Object.values(wSets).flat().filter(s=>s.done).length;
  if(doneSets===0){toast('Marca al menos una serie ✓');return;}
  const duration=timerStart?Math.floor((Date.now()-timerStart)/1000):0;
  const calories=parseInt(document.getElementById('w-calories')?.value)||0;
  if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
  const workout={
    date:Date.now(),day:curDay,dayName:day.name,
    duration, calories,
    exercises:day.exercises.map(ex=>({id:ex.id,name:ex.name,unit:ex.unit,sets:(wSets[ex.id]||[]).filter(s=>s.done).map(s=>({weight:parseFloat(s.weight)||0,reps:s.reps||'0'}))})).filter(ex=>ex.sets.length>0)
  };
  const today=new Date().toDateString();
  let hist=gs('workouts',[]);
  hist=hist.filter(w=>!(w.day===curDay&&new Date(w.date).toDateString()===today));
  hist.push(workout);
  ss('workouts',hist);
  curDay=null;wSets={};timerStart=null;
  toast('✓ Entrenamiento guardado');
  go('home');
}

function makeSVGCircle(workoutPct, calPct, dayNum, isToday, isFuture){
  const size=44, cx=22, cy=22;
  const rOut=18, rIn=12; // outer=workout, inner=calories
  const wStroke=3.2, cStroke=3.2;
  const GREEN='#5af0a8', PINK='#f05ab4';
  const todayGlow=isToday?'<circle cx="22" cy="22" r="21" fill="none" stroke="#7c6af7" stroke-width="1.5" opacity="0.6"/>':'';
  const numColor=isFuture?'#333344':'#c0c0d0';

  // outer ring — workout (green)
  const circOut=2*Math.PI*rOut;
  const trackOut='<circle cx="22" cy="22" r="'+rOut+'" fill="none" stroke="#1e1e28" stroke-width="'+wStroke+'"/>';
  const arcOut=workoutPct>0
    ?'<circle cx="22" cy="22" r="'+rOut+'" fill="none" stroke="'+GREEN+'" stroke-width="'+wStroke+'"'+
      ' stroke-dasharray="'+(circOut*workoutPct/100)+' '+(circOut*(1-workoutPct/100))+'"'+
      ' stroke-dashoffset="'+(circOut*0.25)+'" stroke-linecap="round" opacity="'+(workoutPct>=100?1:0.85)+'"/>'
    :'';

  // inner ring — calorie deficit (pink)
  const circIn=2*Math.PI*rIn;
  const trackIn='<circle cx="22" cy="22" r="'+rIn+'" fill="none" stroke="#1e1e28" stroke-width="'+cStroke+'"/>';
  const arcIn=calPct>0
    ?'<circle cx="22" cy="22" r="'+rIn+'" fill="none" stroke="'+PINK+'" stroke-width="'+cStroke+'"'+
      ' stroke-dasharray="'+(circIn*calPct/100)+' '+(circIn*(1-calPct/100))+'"'+
      ' stroke-dashoffset="'+(circIn*0.25)+'" stroke-linecap="round" opacity="'+(calPct>=100?1:0.85)+'"/>'
    :'';

  // center dot
  const dot=(workoutPct>0||calPct>0)
    ?'<circle cx="22" cy="22" r="2.5" fill="'+(workoutPct>0?GREEN:PINK)+'" opacity="0.7"/>'
    :'<circle cx="22" cy="22" r="2" fill="#222230"/>';

  return '<svg viewBox="0 0 '+size+' '+size+'" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">'
    +todayGlow+trackOut+arcOut+trackIn+arcIn+dot
    +'<text x="22" y="41" text-anchor="middle" font-size="8" font-weight="700" fill="'+numColor+'" font-family="-apple-system,sans-serif">'+dayNum+'<\/text>'
    +'<\/svg>';
}

function renderCalendar(){
  const hist=gs('workouts',[]);
  const now=new Date();
  document.getElementById('cal-title').textContent=MONTHS_ES[calMonth]+' '+calYear;

  // build workout map
  const trainedMap={};
  hist.forEach(w=>{
    if(!w.day||!R[w.day])return;
    const d=new Date(w.date);
    if(d.getFullYear()===calYear&&d.getMonth()===calMonth){
      const key=calYear+'-'+calMonth+'-'+d.getDate();
      const totalExpected=R[w.day].exercises.reduce((s,ex)=>s+ex.sets,0);
      const doneSets=w.exercises.reduce((s,ex)=>s+ex.sets.length,0);
      const pct=totalExpected>0?Math.min(100,Math.round(doneSets/totalExpected*100)):100;
      if(!trainedMap[key]||pct>trainedMap[key].pct)
        trainedMap[key]={day:w.day,pct,burned:w.calories||0};
    }
  });

  // build calorie map from nutrition storage
  // TMB Alba: Mifflin-St Jeor = (10×49) + (6.25×160) - (5×41) - 161 = 1161 kcal
  // Días con entreno: TMB × 1.4 = 1625 kcal basales
  // Días sin entreno: TMB × 1.2 = 1393 kcal basales
  const TMB_WORKOUT=1625, TMB_REST=1393, MAX_DEFICIT=400;
  const calMap={};
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  for(let d=1;d<=daysInMonth;d++){
    const dateKey=calYear+'-'+calMonth+'-'+d;
    const cellDate=new Date(calYear,calMonth,d);
    const nutKey='nut-'+calYear+'-'+calMonth+'-'+d;
    const nutData=gs(nutKey,null);
    if(nutData&&nutData.checked){
      const dayOfWeek=['domingo','lunes','martes','miercoles','jueves','viernes','sabado'][cellDate.getDay()];
      const plan=MEAL_PLAN[dayOfWeek];
      if(plan){
        const eaten=plan.meals.reduce((s,m)=>s+(nutData.checked[m.id]?m.kcal:0),0)+(nutData.extraKcal||0);
        const workout=trainedMap[dateKey];
        const manual=nutData.totalBurnedOverride||0;
        const burned=manual>0?manual:(workout?TMB_WORKOUT:TMB_REST)+(workout?workout.burned:0);
        const deficit=burned-eaten;
        calMap[dateKey]=deficit>0?Math.min(100,Math.round(deficit/MAX_DEFICIT*100)):0;
      }
    }
  }

  // stats
  const totalDays=Object.keys(trainedMap).length;
  const fullDays=Object.values(trainedMap).filter(v=>v.pct>=100).length;
  const streak=calcStreakUpTo(hist,calYear,calMonth);
  const stats=document.getElementById('cal-stats');
  stats.innerHTML=
    '<div class="chip"><div class="chip-v" style="color:#5af0a8">'+totalDays+'<\/div><div class="chip-l">Entrenos<\/div><\/div>'+
    '<div class="chip"><div class="chip-v" style="color:#c8f05a">'+fullDays+'<\/div><div class="chip-l">Completos<\/div><\/div>'+
    '<div class="chip"><div class="chip-v">'+streak+'🔥<\/div><div class="chip-l">Racha<\/div><\/div>';

  const firstDay=new Date(calYear,calMonth,1).getDay();
  const startOffset=(firstDay+6)%7;
  const grid=document.getElementById('cal-grid');
  grid.innerHTML='';
  const wrap=document.createElement('div');wrap.className='cal-grid';

  ['L','M','X','J','V','S','D'].forEach(d=>{
    const h=document.createElement('div');h.className='cal-dow';h.textContent=d;wrap.appendChild(h);
  });

  for(let i=0;i<startOffset;i++){
    const e=document.createElement('div');e.className='cal-day';wrap.appendChild(e);
  }

  for(let day=1;day<=daysInMonth;day++){
    const cell=document.createElement('div');cell.className='cal-day';
    const dateKey=calYear+'-'+calMonth+'-'+day;
    const cellDate=new Date(calYear,calMonth,day);
    const isToday=cellDate.toDateString()===now.toDateString();
    const isFuture=cellDate>now;
    const entry=trainedMap[dateKey];
    const workoutPct=entry?entry.pct:0;
    const calPct=calMap[dateKey]||0;
    cell.innerHTML=makeSVGCircle(workoutPct,calPct,day,isToday,isFuture);
    wrap.appendChild(cell);
  }
  grid.appendChild(wrap);

  // simple legend
  const leg=document.getElementById('cal-legend');
  leg.innerHTML=
    '<div class="cal-legend-item"><div class="cal-legend-dot" style="background:#5af0a8"><\/div><span style="font-size:11px">Entreno<\/span><\/div>'+
    '<div class="cal-legend-item"><div class="cal-legend-dot" style="background:#f05ab4"><\/div><span style="font-size:11px">Déficit calórico<\/span><\/div>';
}

function calcStreakUpTo(hist,year,month){
  if(!hist.length)return 0;
  const dates=[...new Set(hist.map(w=>new Date(w.date).toDateString()))].map(d=>new Date(d)).sort((a,b)=>b-a);
  const ref=new Date();ref.setHours(0,0,0,0);
  let s=0,c=new Date(ref);
  for(const d of dates){const dc=new Date(d);dc.setHours(0,0,0,0);if(dc.getTime()===c.getTime()){s++;c.setDate(c.getDate()-1);}else if(dc<c)break;}
  return s;
}
